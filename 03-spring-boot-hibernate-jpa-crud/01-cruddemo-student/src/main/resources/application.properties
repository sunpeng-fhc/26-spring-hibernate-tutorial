# Turn off spring boot banner
spring.main.banner-mode=off

spring.application.name=cruddemo

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/student_tracker
spring.datasource.username=springstudent
spring.datasource.password=springstudent


#  Reduce logging level. set logging level to warn
logging.level.root=warn

# Add logging configs to display SQL statements
logging.level.org.hibernate.SQL = debug
logging.level.org.hibernate.orm.jdbc.bind = trace

# Configure JPA/Hibernate to auto create the tables
# spring.jpa.hibernate.ddl-auto=create

# update: automatically updates the schema without deleting data (best for development)
# create: recreates the schema on every startup (data will be lost, good for learning/testing)
# validate: only validates the schema, does not make changes (recommended for production)

spring.jpa.hibernate.ddl-auto=update






