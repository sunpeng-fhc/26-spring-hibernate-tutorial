spring.application.name=mycoolapp

# Use wildcard "*" to expose all endpoints
# Can also expose individual endpoints with a comma-delimited  list
# health,info
management.endpoints.web.exposure.include=*
management.info.env.enabled=true

## Exclude individual endpoints with a comma-delimited  list
# management.endpoints.web.exposure.exclude=health,info
info.app.name=My Super Cool App
info.app.description=A crazy  fun app, yoohoo!
info.app.version=1.0.0


##
#  Define my properties
##
coach.name=Mickey Mouse
teame.name=The Mouse Club


#
# Change Spring Boot embedded server port
#
##### Tomcat initialized with port 7070 (http)
server.port=7070

#
# Set the context path of the application
#
# All requests should be prefixed with /mycoolapp
#
##### Tomcat started on port 7070 (http) with context path '/mycoolapp'
server.servlet.context-path=/mycoolapp
















